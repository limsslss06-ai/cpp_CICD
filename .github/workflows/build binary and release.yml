# 1. clone src code
# 2. clone building docker image
# 3. build image
# 4. build container
# 5. run container to build binary
# 6. push/release

name: build binary

on:
  workflow_dispatch:
    
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ clone src code
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2️⃣ clone Dockerfile repo
      - name: Clone Dockerfile repo
        run: |
          git clone https://github.com/limsslss06-ai/dockerfile.git

      # 3️⃣ build Docker image
      - name: Build Docker Image
        run: |
          docker build -f dockerfile/docker/Dockerfile.ubuntu_22.04.v2 \
                       -t docker/ubuntu_22.04.v2:latest \
                       ./dockerfile

      # 4️⃣ run container 
      - name: Build in Container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            docker/ubuntu_22.04.v2:latest \
            bash -c "cmake --preset linux-debug;   cd out/build/linux-debug;  cmake --build --preset linux-debug" # 5.build binary
            

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
      - name: Upload Linux Binary to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./out/build/linux-debug/CMakeProject1
          asset_name: CMakeProject1  # binary file
          asset_content_type: application/octet-stream
